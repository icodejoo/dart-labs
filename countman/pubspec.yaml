name: countman
description: "High-performance counter, countdown & stopwatch animations for Flutter. One shared vsync ticker drives every instance — no per-widget timers, built for high concurrency."
version: 0.1.0
homepage: https://github.com/icodejoo/dart-labs/tree/main/countman
repository: https://github.com/icodejoo/dart-labs
issue_tracker: https://github.com/icodejoo/dart-labs/issues

# Discovery tags (max 5) — one per searchable category, covering all three
# families (counter / countdown / stopwatch) plus the common "timer" search.
topics:
  - counter
  - countdown
  - stopwatch
  - timer
  - animation

environment:
  sdk: ^3.5.0
  flutter: ">=3.0.0"

dependencies:
  flutter:
    sdk: flutter

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^5.0.0
