name: Validate Issue Title

on:
  issues:
    types: [opened, edited]

permissions:
  issues: write

jobs:
  check-title:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/github-script@v7
        with:
          script: |
            const subprojects = [
              'cacheman',
              'dioman',
              'ffuzzy',
              'flutter_stompsocket',
              'getx-query',
              'layerman',
              'other',
            ];
            const pattern = new RegExp(`^\\[(${subprojects.join('|')})\\]\\s*\\S+`, 'i');
            const title = context.payload.issue.title || '';
            const issue_number = context.payload.issue.number;
            const label = 'needs-title-fix';

            const valid = pattern.test(title);

            const { data: labels } = await github.rest.issues.listLabelsOnIssue({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number,
            });
            const hasLabel = labels.some((l) => l.name === label);

            if (!valid) {
              if (!hasLabel) {
                await github.rest.issues.addLabels({
                  owner: context.repo.owner,
                  repo: context.repo.repo,
                  issue_number,
                  labels: [label],
                });
                await github.rest.issues.createComment({
                  owner: context.repo.owner,
                  repo: context.repo.repo,
                  issue_number,
                  body:
                    `标题格式不对。请改成 \`[子项目名] 具体问题\`，子项目名取以下之一：\n\n` +
                    subprojects.map((s) => `- \`${s}\``).join('\n') +
                    `\n\n例如：\`[ffuzzy] 高亮位置计算错误\`。`,
                });
              }
            } else if (hasLabel) {
              await github.rest.issues.removeLabel({
                owner: context.repo.owner,
                repo: context.repo.repo,
                issue_number,
                name: label,
              });
            }
