name: Deploy dioman demo

on:
  push:
    branches: [main]
    paths:
      - 'dioman/lib/**'
      - 'dioman/example/lib/**'
      - 'dioman/example/pubspec.yaml'
      - 'dioman/pubspec.yaml'
      - '.github/workflows/deploy-dioman.yml'
      - '.github/workflows/update-root-index.yml'
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: gh-pages
  cancel-in-progress: false

jobs:
  deploy:
    name: Build & deploy dioman
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: subosito/flutter-action@v2
        with:
          channel: stable
          cache: true
      - name: Package dependencies
        working-directory: dioman
        run: flutter pub get
      - name: Example dependencies
        working-directory: dioman/example
        run: flutter pub get
      - name: Build web
        working-directory: dioman/example
        run: flutter build web --release --base-href /dart-labs/dioman/
      - name: Deploy dioman/ to gh-pages
        uses: peaceiris/actions-gh-pages@v4
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: dioman/example/build/web
          destination_dir: dioman
          keep_files: true

  update-index:
    name: Update root index
    needs: deploy
    uses: ./.github/workflows/update-root-index.yml
    secrets: inherit
