name: Deploy flutter_stompsocket demo

on:
  push:
    branches: [main]
    paths:
      - 'flutter_stompsocket/lib/**'
      - 'flutter_stompsocket/example/lib/**'
      - 'flutter_stompsocket/example/web/**'
      - 'flutter_stompsocket/example/pubspec.yaml'
      - 'flutter_stompsocket/pubspec.yaml'
      - '.github/workflows/deploy-stompsocket.yml'
      - '.github/workflows/update-root-index.yml'
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: gh-pages
  cancel-in-progress: false

jobs:
  deploy:
    name: Build & deploy flutter_stompsocket
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: subosito/flutter-action@v2
        with:
          channel: stable
          cache: true
      - name: Package dependencies
        working-directory: flutter_stompsocket
        run: flutter pub get
      - name: Example dependencies
        working-directory: flutter_stompsocket/example
        run: flutter pub get
      - name: Build web
        working-directory: flutter_stompsocket/example
        run: flutter build web --release --base-href /dart-labs/stompsocket/
      - name: Deploy stompsocket/ to gh-pages
        uses: peaceiris/actions-gh-pages@v4
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: flutter_stompsocket/example/build/web
          destination_dir: stompsocket
          keep_files: true

  update-index:
    name: Update root index
    needs: deploy
    uses: ./.github/workflows/update-root-index.yml
    secrets: inherit
