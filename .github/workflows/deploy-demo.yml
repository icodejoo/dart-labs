# Builds only CHANGED sub-project demos and deploys them with a complete site.
#
# Architecture:
#   1. `changes` job: dorny/paths-filter detects which packages changed.
#   2. Each `build-*` job is conditional (if: changed == 'true') and retains
#      its artifact for 90 days so future unchanged-package downloads work.
#   3. `assemble` job: for changed packages, downloads the fresh artifact from
#      this run; for unchanged packages, restores the most-recent artifact from
#      a previous successful run (dawidd6/action-download-artifact).
#      This ensures the deployed site is always complete even when only one
#      package changed.
#
# Live site:
#   https://icodejoo.github.io/dart-labs/             — landing index
#   https://icodejoo.github.io/dart-labs/countman/    — Countman demo
#   https://icodejoo.github.io/dart-labs/dioman/      — Dioman demo
#   https://icodejoo.github.io/dart-labs/layerman/    — Layerman demo
#
# First-time repo setup (one-time):
#   Settings → Pages → Source → "GitHub Actions"
#
# To add a new sub-project <pkg>:
#   1. Add paths to `changes` job filters (same block as countman).
#   2. Add paths to `on.push.paths` trigger list.
#   3. Copy the `build-countman` job; rename to `build-<pkg>`; adjust
#      working-directory and --base-href.
#   4. Add `build-<pkg>` to `assemble.needs`.
#   5. Add two download steps in `assemble` (fresh + previous-run pattern).
#   6. Add a card to the root index.html in the assemble job.

name: Deploy Demos

on:
  push:
    branches: [main]
    paths:
      - 'countman/lib/**'
      - 'countman/example/lib/**'
      - 'countman/example/pubspec.yaml'
      - 'countman/pubspec.yaml'
      - 'dioman/lib/**'
      - 'dioman/example/lib/**'
      - 'dioman/example/pubspec.yaml'
      - 'dioman/pubspec.yaml'
      - 'layerman/lib/**'
      - 'layerman/example/lib/**'
      - 'layerman/example/web/**'
      - 'layerman/example/pubspec.yaml'
      - 'layerman/pubspec.yaml'
      - '.github/workflows/deploy-demo.yml'
  workflow_dispatch:

permissions:
  actions: read   # needed by dawidd6/action-download-artifact to fetch previous artifacts
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

# ── Jobs ──────────────────────────────────────────────────────────────────────

jobs:
  # ── Detect changed packages ────────────────────────────────────────────────
  changes:
    name: Detect changed packages
    runs-on: ubuntu-latest
    outputs:
      countman: ${{ steps.filter.outputs.countman }}
      dioman:   ${{ steps.filter.outputs.dioman }}
      layerman: ${{ steps.filter.outputs.layerman }}
    steps:
      - uses: actions/checkout@v4
      - uses: dorny/paths-filter@v3
        id: filter
        with:
          filters: |
            countman:
              - 'countman/lib/**'
              - 'countman/example/lib/**'
              - 'countman/example/pubspec.yaml'
              - 'countman/pubspec.yaml'
            dioman:
              - 'dioman/lib/**'
              - 'dioman/example/lib/**'
              - 'dioman/example/pubspec.yaml'
              - 'dioman/pubspec.yaml'
            layerman:
              - 'layerman/lib/**'
              - 'layerman/example/lib/**'
              - 'layerman/example/web/**'
              - 'layerman/example/pubspec.yaml'
              - 'layerman/pubspec.yaml'

  # ── countman demo ──────────────────────────────────────────────────────────
  build-countman:
    name: Build countman demo
    needs: changes
    if: needs.changes.outputs.countman == 'true'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: subosito/flutter-action@v2
        with:
          channel: stable
          cache: true
      - name: Package dependencies
        working-directory: countman
        run: flutter pub get
      - name: Example dependencies
        working-directory: countman/example
        run: flutter pub get
      - name: Build web
        working-directory: countman/example
        run: flutter build web --release --base-href /dart-labs/countman/
      - uses: actions/upload-artifact@v4
        with:
          name: countman-web
          path: countman/example/build/web
          retention-days: 90   # kept long enough for future unchanged-package restores

  # ── dioman demo ────────────────────────────────────────────────────────────
  build-dioman:
    name: Build dioman demo
    needs: changes
    if: needs.changes.outputs.dioman == 'true'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: subosito/flutter-action@v2
        with:
          channel: stable
          cache: true
      - name: Package dependencies
        working-directory: dioman
        run: flutter pub get
      - name: Example dependencies
        working-directory: dioman/example
        run: flutter pub get
      - name: Build web
        working-directory: dioman/example
        run: flutter build web --release --base-href /dart-labs/dioman/
      - uses: actions/upload-artifact@v4
        with:
          name: dioman-web
          path: dioman/example/build/web
          retention-days: 90

  # ── layerman demo ──────────────────────────────────────────────────────────
  build-layerman:
    name: Build layerman demo
    needs: changes
    if: needs.changes.outputs.layerman == 'true'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: subosito/flutter-action@v2
        with:
          channel: stable
          cache: true
      - name: Package dependencies
        working-directory: layerman
        run: flutter pub get
      - name: Example dependencies
        working-directory: layerman/example
        run: flutter pub get
      - name: Build web
        working-directory: layerman/example
        run: flutter build web --release --base-href /dart-labs/layerman/
      - uses: actions/upload-artifact@v4
        with:
          name: layerman-web
          path: layerman/example/build/web
          retention-days: 90

  # ── Assemble: merge this run's fresh builds with previous-run artifacts ────
  assemble:
    name: Assemble site
    needs: [changes, build-countman, build-dioman, build-layerman]
    # Run even when some build jobs were skipped; abort only on failure/cancel.
    if: >-
      always() && !cancelled() &&
      (needs.build-countman.result == 'success' || needs.build-countman.result == 'skipped') &&
      (needs.build-dioman.result   == 'success' || needs.build-dioman.result   == 'skipped') &&
      (needs.build-layerman.result == 'success' || needs.build-layerman.result == 'skipped')
    runs-on: ubuntu-latest
    steps:
      # ── countman ────────────────────────────────────────────────────────────
      - name: Download countman (this run — rebuilt)
        if: needs.changes.outputs.countman == 'true'
        uses: actions/download-artifact@v4
        with:
          name: countman-web
          path: site/countman

      - name: Download countman (previous run — unchanged)
        if: needs.changes.outputs.countman != 'true'
        uses: dawidd6/action-download-artifact@v6
        with:
          workflow: deploy-demo.yml
          branch: main
          name: countman-web
          path: site/countman
          if_no_artifact_found: warn   # first-ever run: no previous artifact yet

      # ── dioman ──────────────────────────────────────────────────────────────
      - name: Download dioman (this run — rebuilt)
        if: needs.changes.outputs.dioman == 'true'
        uses: actions/download-artifact@v4
        with:
          name: dioman-web
          path: site/dioman

      - name: Download dioman (previous run — unchanged)
        if: needs.changes.outputs.dioman != 'true'
        uses: dawidd6/action-download-artifact@v6
        with:
          workflow: deploy-demo.yml
          branch: main
          name: dioman-web
          path: site/dioman
          if_no_artifact_found: warn

      # ── layerman ────────────────────────────────────────────────────────────
      - name: Download layerman (this run — rebuilt)
        if: needs.changes.outputs.layerman == 'true'
        uses: actions/download-artifact@v4
        with:
          name: layerman-web
          path: site/layerman

      - name: Download layerman (previous run — unchanged)
        if: needs.changes.outputs.layerman != 'true'
        uses: dawidd6/action-download-artifact@v6
        with:
          workflow: deploy-demo.yml
          branch: main
          name: layerman-web
          path: site/layerman
          if_no_artifact_found: warn

      # ── Root landing page ────────────────────────────────────────────────
      - name: Generate root index
        run: |
          mkdir -p site
          cat > site/index.html << 'HTML'
          <!DOCTYPE html>
          <html lang="en">
          <head>
            <meta charset="UTF-8">
            <meta name="viewport" content="width=device-width, initial-scale=1.0">
            <title>dart-labs demos</title>
            <style>
              * { box-sizing: border-box; margin: 0; padding: 0; }
              body {
                font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
                background: #0d1117; color: #e6edf3;
                display: flex; flex-direction: column;
                align-items: center; min-height: 100vh;
                padding: 48px 16px;
              }
              h1 { font-size: 2rem; margin-bottom: 8px; }
              .subtitle { color: #8b949e; margin-bottom: 48px; }
              .grid {
                display: grid;
                grid-template-columns: repeat(auto-fill, minmax(280px, 1fr));
                gap: 16px; width: 100%; max-width: 960px;
              }
              a.card {
                display: block; padding: 24px;
                background: #161b22; border: 1px solid #30363d;
                border-radius: 12px; text-decoration: none; color: inherit;
                transition: border-color .2s, transform .15s;
              }
              a.card:hover { border-color: #58a6ff; transform: translateY(-2px); }
              .card-title { font-size: 1.2rem; font-weight: 700; margin-bottom: 6px; }
              .card-desc  { font-size: .875rem; color: #8b949e; line-height: 1.5; }
              .badge {
                display: inline-block; margin-top: 12px;
                padding: 3px 10px; border-radius: 20px;
                font-size: .75rem; font-weight: 600;
                background: #1f6feb33; color: #58a6ff;
                border: 1px solid #1f6feb;
              }
            </style>
          </head>
          <body>
            <h1>dart-labs / demos</h1>
            <p class="subtitle">Live Flutter Web demos for every package in the monorepo</p>
            <div class="grid">
              <a class="card" href="countman/">
                <div class="card-title">⏱ countman</div>
                <div class="card-desc">
                  High-performance shared-ticker counter &amp; countdown animations.
                  Counter · Countdown · Elapsed — all APIs demoed.
                </div>
                <span class="badge">Flutter Web</span>
              </a>
              <a class="card" href="dioman/">
                <div class="card-title">🔌 dioman</div>
                <div class="card-desc">
                  Composable Dio interceptor plugins — auth, cache, retry, dedup,
                  mock, normalize and more. Live request playground, no server needed.
                </div>
                <span class="badge">Flutter Web</span>
              </a>
              <a class="card" href="layerman/">
                <div class="card-title">🗂 layerman</div>
                <div class="card-desc">
                  Flutter-native overlay queue manager — serial queue, replace,
                  affix, overlap, cooldown, conditions, external presenters and more.
                  All APIs interactively demoed.
                </div>
                <span class="badge">Flutter Web</span>
              </a>
            </div>
          </body>
          </html>
          HTML

      - name: Configure Pages
        uses: actions/configure-pages@v4

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: site

  # ── Deploy ─────────────────────────────────────────────────────────────────
  deploy:
    name: Deploy to GitHub Pages
    needs: assemble
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deploy.outputs.page_url }}
    steps:
      - name: Deploy
        id: deploy
        uses: actions/deploy-pages@v4
