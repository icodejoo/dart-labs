name: Subproject Issue
description: Report a bug or request a feature for a subproject in this monorepo
title: ""
labels: []
body:
  - type: dropdown
    id: subproject
    attributes:
      label: Subproject
      description: Which subproject is this issue about?
      options:
        - cacheman
        - dioman
        - ffuzzy
        - flutter_stompsocket
        - getx-query
        - layerman
        - other
    validations:
      required: true

  - type: textarea
    id: description
    attributes:
      label: Description
      description: What happened? What did you expect?
    validations:
      required: true

  - type: textarea
    id: repro
    attributes:
      label: Steps to reproduce / environment
      description: Reproduction steps, Dart/Flutter version, platform, etc.
    validations:
      required: false
