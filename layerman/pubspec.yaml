name: layerman
description: "Headless overlay queue orchestrator: serial one-at-a-time queueing with priority, replace, overlap, conditions, cooldown and two-phase close; renders through any UI backend (showDialog / GetX / bot_toast / your own)."
version: 0.2.0
homepage: https://github.com/icodejoo/dart-labs/tree/main/layerman
repository: https://github.com/icodejoo/dart-labs
issue_tracker: https://github.com/icodejoo/dart-labs/issues

topics:
  - overlay
  - dialog
  - toast
  - queue
  - snackbar

environment:
  sdk: ^3.12.2
  flutter: ">=1.17.0"

dependencies:
  flutter:
    sdk: flutter

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0

