<svg viewBox="0 0 1400 950" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <style>
      .box { fill: #FDE8D0; stroke: #333; stroke-width: 2; }
      .box-api { fill: #E8F5E9; stroke: #333; stroke-width: 1.5; }
      .box-plugin { fill: #FFF9C4; stroke: #333; stroke-width: 1.5; }
      .text-title { font-size: 18px; font-weight: bold; font-family: Arial; }
      .text-label { font-size: 13px; font-family: Arial; }
      .text-small { font-size: 11px; font-family: Arial; }
      .text-api { font-size: 10px; font-family: 'Courier New', monospace; }
      .arrow { stroke: #333; stroke-width: 2; fill: none; marker-end: url(#arrowhead); }
      .arrow-small { stroke: #666; stroke-width: 1.5; fill: none; marker-end: url(#arrowhead-small); }
    </style>
    <marker id="arrowhead" markerWidth="10" markerHeight="10" refX="9" refY="3" orient="auto">
      <polygon points="0 0, 10 3, 0 6" fill="#333"/>
    </marker>
    <marker id="arrowhead-small" markerWidth="8" markerHeight="8" refX="7" refY="2" orient="auto">
      <polygon points="0 0, 8 2, 0 4" fill="#666"/>
    </marker>
  </defs>

  <text x="700" y="30" text-anchor="middle" class="text-title">Cacheman (Dart) 完整架构流程图</text>
  <text x="700" y="50" text-anchor="middle" class="text-label">Dart 缓存管理库 | 统一接口多后端支持</text>

  <!-- 应用层 -->
  <rect x="50" y="80" width="200" height="120" class="box" rx="8"/>
  <text x="150" y="110" text-anchor="middle" class="text-title">应用代码</text>
  <text x="150" y="130" text-anchor="middle" class="text-label">App Code</text>
  <text x="150" y="150" text-anchor="middle" class="text-api">cacheman.get(key)</text>
  <text x="150" y="165" text-anchor="middle" class="text-api">cacheman.set(key, val)</text>
  <text x="150" y="180" text-anchor="middle" class="text-api">cacheman.delete(key)</text>

  <path d="M 250 140 L 320 140" class="arrow"/>

  <!-- Cacheman 核心 -->
  <rect x="320" y="80" width="200" height="120" class="box" rx="8"/>
  <text x="420" y="110" text-anchor="middle" class="text-title">Cacheman 核心</text>
  <text x="420" y="130" text-anchor="middle" class="text-label">Cache Manager</text>
  <text x="420" y="150" text-anchor="middle" class="text-api">get/set/delete/clear</text>
  <text x="420" y="165" text-anchor="middle" class="text-api">has(key)</text>
  <text x="420" y="180" text-anchor="middle" class="text-api">select adapter</text>

  <path d="M 420 200 L 420 260" class="arrow"/>

  <!-- 处理管道 -->
  <text x="50" y="260" class="text-label" font-weight="bold">📦 缓存处理</text>

  <!-- 键前缀处理 -->
  <rect x="50" y="280" width="160" height="130" class="box-plugin" rx="5"/>
  <text x="130" y="305" text-anchor="middle" class="text-label">键处理</text>
  <text x="130" y="320" text-anchor="middle" class="text-small">Key Processor</text>
  <line x1="60" y1="330" x2="200" y2="330" stroke="#ccc" stroke-width="1"/>
  <text x="130" y="348" text-anchor="middle" class="text-api">namespace prefix</text>
  <text x="130" y="363" text-anchor="middle" class="text-api">hash key</text>
  <text x="130" y="378" text-anchor="middle" class="text-api">validate</text>
  <text x="130" y="393" text-anchor="middle" class="text-small">统一键管理</text>

  <!-- TTL 处理 -->
  <rect x="230" y="280" width="160" height="130" class="box-plugin" rx="5"/>
  <text x="310" y="305" text-anchor="middle" class="text-label">过期管理</text>
  <text x="310" y="320" text-anchor="middle" class="text-small">TTL Manager</text>
  <line x1="240" y1="330" x2="380" y2="330" stroke="#ccc" stroke-width="1"/>
  <text x="310" y="348" text-anchor="middle" class="text-api">checkExpire()</text>
  <text x="310" y="363" text-anchor="middle" class="text-api">ttl value wrapper</text>
  <text x="310" y="378" text-anchor="middle" class="text-api">auto cleanup</text>
  <text x="310" y="393" text-anchor="middle" class="text-small">生命周期管理</text>

  <!-- 持久化 -->
  <rect x="410" y="280" width="160" height="130" class="box-plugin" rx="5"/>
  <text x="490" y="305" text-anchor="middle" class="text-label">持久化策略</text>
  <text x="490" y="320" text-anchor="middle" class="text-small">Persistence</text>
  <line x1="420" y1="330" x2="560" y2="330" stroke="#ccc" stroke-width="1"/>
  <text x="490" y="348" text-anchor="middle" class="text-api">serialize/deserialize</text>
  <text x="490" y="363" text-anchor="middle" class="text-api">JSON/binary</text>
  <text x="490" y="378" text-anchor="middle" class="text-api">compression</text>
  <text x="490" y="393" text-anchor="middle" class="text-small">数据序列化</text>

  <!-- 后端适配 -->
  <rect x="590" y="280" width="160" height="130" class="box-plugin" rx="5"/>
  <text x="670" y="305" text-anchor="middle" class="text-label">后端适配</text>
  <text x="670" y="320" text-anchor="middle" class="text-small">Adapters</text>
  <line x1="600" y1="330" x2="740" y2="330" stroke="#ccc" stroke-width="1"/>
  <text x="670" y="348" text-anchor="middle" class="text-api">Memory / SharedPrefs</text>
  <text x="670" y="363" text-anchor="middle" class="text-api">Hive / Sqflite</text>
  <text x="670" y="378" text-anchor="middle" class="text-api">File / HTTP</text>
  <text x="670" y="393" text-anchor="middle" class="text-small">可插拔后端</text>

  <!-- 箭头 -->
  <path d="M 130 410 L 300 480" class="arrow-small"/>
  <path d="M 310 410 L 350 480" class="arrow-small"/>
  <path d="M 490 410 L 420 480" class="arrow-small"/>
  <path d="M 670 410 L 450 480" class="arrow-small"/>

  <!-- 后端操作 -->
  <rect x="300" y="480" width="240" height="110" class="box-api" rx="8"/>
  <text x="420" y="510" text-anchor="middle" class="text-title">后端存储</text>
  <text x="420" y="530" text-anchor="middle" class="text-label">Backend Execution</text>
  <line x1="310" y1="540" x2="530" y2="540" stroke="#999" stroke-width="1"/>
  <text x="350" y="558" text-anchor="middle" class="text-api">adapter.get/set</text>
  <text x="490" y="558" text-anchor="middle" class="text-api">adapter.delete</text>
  <text x="420" y="575" text-anchor="middle" class="text-api">异步操作执行</text>

  <path d="M 420 590 L 420 650" class="arrow"/>

  <!-- 缓存击穿防护 -->
  <rect x="300" y="650" width="240" height="110" class="box" rx="8"/>
  <text x="420" y="680" text-anchor="middle" class="text-title">并发控制</text>
  <text x="420" y="700" text-anchor="middle" class="text-label">Concurrency Control</text>
  <line x1="310" y1="710" x2="530" y2="710" stroke="#999" stroke-width="1"/>
  <text x="350" y="728" text-anchor="middle" class="text-api">防缓存击穿</text>
  <text x="490" y="728" text-anchor="middle" class="text-api">一致性保证</text>
  <text x="420" y="745" text-anchor="middle" class="text-api">并发请求合并</text>

  <path d="M 420 760 L 420 820" class="arrow"/>

  <!-- 返回应用 -->
  <rect x="300" y="820" width="240" height="110" class="box" rx="8"/>
  <text x="420" y="850" text-anchor="middle" class="text-title">返回应用</text>
  <text x="420" y="870" text-anchor="middle" class="text-label">Return Value</text>
  <line x1="310" y1="880" x2="530" y2="880" stroke="#999" stroke-width="1"/>
  <text x="350" y="898" text-anchor="middle" class="text-api">Future[T] / Stream</text>
  <text x="490" y="898" text-anchor="middle" class="text-api">null safe</text>
  <text x="420" y="915" text-anchor="middle" class="text-api">应用获取缓存数据</text>

  <text x="50" y="930" class="text-small" font-weight="bold">完整流程：应用调用 → 键处理 → TTL管理 → 序列化 → 后端适配 → 后端存储 → 并发控制 → 返回应用</text>
</svg>