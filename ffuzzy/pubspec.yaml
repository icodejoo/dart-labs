name: ffuzzy
description: >-
  Fast fuzzy search for Flutter, powered by a compact C engine via dart:ffi:
  fuzzy/substring/prefix/postfix/exact matching over a resident corpus,
  multi-threading, async filtering, hit highlighting, and Unicode (CJK).
version: 0.6.2
repository: https://github.com/icodejoo/dart-labs/tree/main/ffuzzy
homepage: https://github.com/icodejoo/dart-labs/tree/main/ffuzzy
issue_tracker: https://github.com/icodejoo/dart-labs/issues
topics:
  - fuzzy-search
  - ffi
  - matcher
  - search
  - unicode

environment:
  sdk: ^3.6.0
  flutter: '>=3.24.0'

dependencies:
  flutter:
    sdk: flutter
  ffi: ^2.1.0
  web: ^1.1.0
  flutter_web_plugins:
    sdk: flutter

dev_dependencies:
  flutter_lints: ^4.0.0
  flutter_test:
    sdk: flutter

flutter:
  plugin:
    platforms:
      android:
        ffiPlugin: true
      ios:
        ffiPlugin: true
      linux:
        ffiPlugin: true
      macos:
        ffiPlugin: true
      windows:
        ffiPlugin: true
      web:
        pluginClass: FfuzzyPlugin
        fileName: src/ffuzzy_web_plugin.dart
