name: ffuzzy
description: >-
  Fast fuzzy search for Flutter, powered by a compact C engine via dart:ffi:
  fuzzy/substring/prefix/postfix/exact matching over a resident corpus,
  multi-threading, async filtering, hit highlighting, and Unicode (CJK).
version: 0.5.0
repository: https://github.com/icodejoo/ffuzzy
homepage: https://github.com/icodejoo/ffuzzy
issue_tracker: https://github.com/icodejoo/ffuzzy/issues
topics:
  - fuzzy-search
  - ffi
  - matcher
  - search
  - unicode

environment:
  sdk: ^3.4.0
  flutter: '>=3.10.0'

dependencies:
  flutter:
    sdk: flutter
  ffi: ^2.1.0

dev_dependencies:
  flutter_lints: ^4.0.0
  flutter_test:
    sdk: flutter

flutter:
  plugin:
    platforms:
      android:
        ffiPlugin: true
      ios:
        ffiPlugin: true
      linux:
        ffiPlugin: true
      macos:
        ffiPlugin: true
      windows:
        ffiPlugin: true
