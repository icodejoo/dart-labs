// Flutter Android FFI-plugin native build: compiles the C sources via CMake
// for each ABI (arm64-v8a, armeabi-v7a, x86_64, x86) and bundles libffz.so.
group 'dev.ffz'
version '0.4.0'

buildscript {
    repositories { google(); mavenCentral() }
    dependencies { classpath 'com.android.tools.build:gradle:8.1.0' }
}

rootProject.allprojects {
    repositories { google(); mavenCentral() }
}

apply plugin: 'com.android.library'

android {
    namespace 'dev.ffz'
    compileSdk 34
    ndkVersion '26.1.10909125'

    defaultConfig {
        minSdk 21
        externalNativeBuild {
            cmake { abiFilters 'arm64-v8a', 'armeabi-v7a', 'x86_64', 'x86' }
        }
    }

    // The native debug/release split is driven by CMAKE_BUILD_TYPE, which AGP
    // sets per variant: the debuggable `debug` variant -> Debug (locatable:
    // symbols kept, crashes pinpointed in-process), `release` -> Release
    // (compressed + stripped). See ../CMakeLists.txt. Nothing to override here.

    externalNativeBuild {
        cmake {
            // clang/CMakeLists.txt (two levels up from android/).
            path '../CMakeLists.txt'
        }
    }
}
